name: Test MSI Build

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/windows-build-support'
    paths:
      - 'installer/**'
      - '.github/workflows/test-msi.yml'

jobs:
  test-msi:
    name: Test MSI Build
    runs-on: windows-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix --version 6.0.2
          wix extension add WixToolset.UI.wixext/6.0.2

      - name: Create dummy executables
        run: |
          New-Item -ItemType Directory -Force -Path installer\bin
          # Copy a real Windows EXE to use as dummy (has valid PE headers with version info)
          Copy-Item "$env:SystemRoot\System32\cmd.exe" installer\bin\gizmosql_server.exe
          Copy-Item "$env:SystemRoot\System32\cmd.exe" installer\bin\gizmosql_client.exe
          Copy-Item "$env:SystemRoot\System32\vcruntime140.dll" installer\bin\
          Copy-Item "$env:SystemRoot\System32\vcruntime140_1.dll" installer\bin\
          Copy-Item "$env:SystemRoot\System32\msvcp140.dll" installer\bin\

      - name: Convert logo to BMP
        run: |
          Add-Type -AssemblyName System.Drawing
          $logo = [System.Drawing.Image]::FromFile("${{ github.workspace }}\installer\gizmosql_logo.png")
          $banner = New-Object System.Drawing.Bitmap(493, 58)
          $g = [System.Drawing.Graphics]::FromImage($banner)
          $g.Clear([System.Drawing.Color]::White)
          $g.DrawImage($logo, 10, 4, 200, 50)
          $g.Dispose()
          $banner.Save("${{ github.workspace }}\installer\banner.bmp", [System.Drawing.Imaging.ImageFormat]::Bmp)
          $dialog = New-Object System.Drawing.Bitmap(493, 312)
          $g = [System.Drawing.Graphics]::FromImage($dialog)
          $g.Clear([System.Drawing.Color]::White)
          $g.DrawImage($logo, 20, 20, 300, 75)
          $g.Dispose()
          $dialog.Save("${{ github.workspace }}\installer\dialog.bmp", [System.Drawing.Imaging.ImageFormat]::Bmp)
          $logo.Dispose()

      - name: Create license.rtf
        run: |
          $license = Get-Content "${{ github.workspace }}\LICENSE" -Raw
          $rtf = "{\rtf1\ansi\deff0 {\fonttbl {\f0 Consolas;}}\f0\fs18 " + ($license -replace "`n", "\par ") + "}"
          Set-Content -Path "${{ github.workspace }}\installer\license.rtf" -Value $rtf

      - name: Build MSI
        run: |
          wix build `
            "${{ github.workspace }}\installer\GizmoSQL.wxs" `
            -b BinDir="${{ github.workspace }}\installer\bin" `
            -b "${{ github.workspace }}\installer" `
            -o "${{ github.workspace }}\installer\GizmoSQL-amd64.msi" `
            -ext WixToolset.UI.wixext

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Install AzureSignTool
        run: dotnet tool install --global AzureSignTool

      - name: Sign MSI
        run: |
          AzureSignTool sign `
            --azure-key-vault-url "${{ secrets.AZURE_KEY_VAULT_URI }}" `
            --azure-key-vault-certificate "${{ secrets.AZURE_CERT_NAME }}" `
            --azure-key-vault-managed-identity `
            --timestamp-rfc3161 http://timestamp.digicert.com `
            --timestamp-digest sha256 `
            --file-digest sha256 `
            --verbose `
            "${{ github.workspace }}\installer\GizmoSQL-amd64.msi"

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: GizmoSQL-test-amd64.msi
          path: installer/GizmoSQL-amd64.msi
          if-no-files-found: error
