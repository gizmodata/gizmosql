name: scout-test

# TEMPORARY validation workflow for the Docker Scout hardening work.
# Exercises ONLY the new image build + digest-merge + attestation path against
# a throwaway GHCR repo (ghcr.io/gizmodata/gizmosql-scouttest). It does NOT
# touch production tags, does NOT create a GitHub release, and does NOT update
# Homebrew or the Python package. Delete this file once validation is done.
#
# Run with:  gh workflow run scout-test.yml --ref feature/docker-scout-hardening
#
# Binaries are pulled from the latest published release (known-good) instead of
# rebuilding from source — this validates the Docker packaging, the multi-arch
# digest merge, and the provenance/SBOM attestations, not the C++ build.

on:
  # Auto-runs on push to the hardening branch (a brand-new workflow_dispatch
  # workflow isn't dispatchable until it lands on the default branch, so we
  # self-trigger here instead). Remove this whole file once validation is done.
  push:
    branches:
      - feature/docker-scout-hardening
    paths:
      - Dockerfile.ci
      - Dockerfile-slim.ci
      - .github/workflows/scout-test.yml
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to pull known-good Linux binaries from"
        type: string
        required: false
        default: "v1.26.3"

env:
  TEST_IMAGE: ghcr.io/gizmodata/gizmosql-scouttest

jobs:
  build:
    name: Build & push-by-digest (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: amd64
            runner: ubuntu-latest
          - platform: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download known-good CLI binaries from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release download "${{ inputs.release_tag || 'v1.26.3' }}" \
            --repo "${{ github.repository }}" \
            --pattern "gizmosql_cli_linux_${{ matrix.platform }}.zip"
          unzip -o "gizmosql_cli_linux_${{ matrix.platform }}.zip"
          # The zip is flat (zip -j) and contains gizmosql_server + gizmosql_client,
          # which is exactly what Dockerfile.ci / Dockerfile-slim.ci COPY from the
          # build context root.
          chmod +x gizmosql_server gizmosql_client
          ls -la gizmosql_server gizmosql_client

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push full image (by digest)
        id: build-full
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/${{ matrix.platform }}
          file: Dockerfile.ci
          build-args: |
            DUCKDB_VERSION=1.5.3
          no-cache: true
          provenance: mode=max
          sbom: true
          outputs: type=image,name=${{ env.TEST_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Build & push slim image (by digest)
        id: build-slim
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/${{ matrix.platform }}
          file: Dockerfile-slim.ci
          no-cache: true
          provenance: mode=max
          sbom: true
          outputs: type=image,name=${{ env.TEST_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digests
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests/full /tmp/digests/slim
          # Store the bare digest (sans sha256:) as the filename, matching the
          # production merge job's expectations.
          fd="${{ steps.build-full.outputs.digest }}"
          sd="${{ steps.build-slim.outputs.digest }}"
          touch "/tmp/digests/full/${fd#sha256:}"
          touch "/tmp/digests/slim/${sd#sha256:}"

      - name: Upload full digest
        uses: actions/upload-artifact@v7
        with:
          name: scout-digests-full-${{ matrix.platform }}
          path: /tmp/digests/full/*
          if-no-files-found: error
          retention-days: 1

      - name: Upload slim digest
        uses: actions/upload-artifact@v7
        with:
          name: scout-digests-slim-${{ matrix.platform }}
          path: /tmp/digests/slim/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifests & inspect attestations
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v7
        with:
          path: /tmp/digests
          pattern: scout-digests-*

      - name: Create multi-arch manifests
        run: |
          set -euo pipefail
          for variant in full slim; do
            if [ "$variant" = "slim" ]; then tag="scout-slim"; else tag="scout-full"; fi
            digests=()
            for dir in /tmp/digests/scout-digests-${variant}-*; do
              [ -d "$dir" ] || continue
              for f in "$dir"/*; do digests+=("$(basename "$f")"); done
            done
            if [ ${#digests[@]} -eq 0 ]; then
              echo "ERROR: no digests for ${variant}" >&2; exit 1
            fi
            sources=()
            for d in "${digests[@]}"; do sources+=("${{ env.TEST_IMAGE }}@sha256:${d}"); done
            echo "::group::Creating ${{ env.TEST_IMAGE }}:${tag} from ${sources[*]}"
            docker buildx imagetools create -t "${{ env.TEST_IMAGE }}:${tag}" "${sources[@]}"
            echo "::endgroup::"
          done

      - name: Inspect manifests (platforms + attestations)
        run: |
          set -euo pipefail
          for tag in scout-full scout-slim; do
            echo "=================================================================="
            echo "  ${{ env.TEST_IMAGE }}:${tag}"
            echo "=================================================================="
            docker buildx imagetools inspect "${{ env.TEST_IMAGE }}:${tag}" --raw \
              | grep -E '"architecture"|"os"|in-toto|vnd.in-toto|attestation' || true
            echo "---- full inspect ----"
            docker buildx imagetools inspect "${{ env.TEST_IMAGE }}:${tag}"
          done

      - name: Docker Scout quickview (best-effort)
        continue-on-error: true
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: ${{ env.TEST_IMAGE }}:scout-full
